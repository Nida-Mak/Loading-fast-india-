name: Loading Fast Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Expo CLI and Dependencies
        run: |
          npm install
          npm install -g expo-cli

      - name: Build APK (Preview)
        run: npx expo export --platform android

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: loading-fast-dist
          path: dist/
