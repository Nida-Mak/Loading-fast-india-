name: Loading Fast Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Loading-fast-india- # अगर आपके फोल्डर का नाम यही है

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npx expo export --platform android

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: loading-fast-output
          path: Loading-fast-india-/dist/
          
