name: Loading Fast Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          else
            cd Loading-fast-india- && npm install
          fi

      - name: Build and Export
        run: |
          if [ -f "package.json" ]; then
            npx expo export --platform android
          else
            cd Loading-fast-india- && npx expo export --platform android
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loading-fast-output
          path: "**/dist/**"
          
